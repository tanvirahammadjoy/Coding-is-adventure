# docker-compose.yml
# This file defines the services for the fullstack boilerplate application, including MongoDB, backend, and frontend services.
services:
    mongodb:
        image: mongo:7
        container_name: fullstack-mongodb
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password123
        volumes:
            - mongodb_data:/data/db
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: fullstack-backend
        ports:
            - '5000:5000'
        environment:
            NODE_ENV: production
            PORT: 5000
            MONGODB_URI: mongodb://admin:password@mongodb:27017/fullstack-boilerplate?authSource=admin
            JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production}
            JWT_EXPIRE: 7d
        depends_on:
            mongodb:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
                ]
            interval: 30s
            timeout: 10s
            retries: 3

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: fullstack-frontend
        ports:
            - '3000:3000'
        depends_on:
            - backend
        environment:
            - VITE_API_URL=http://localhost:5000

volumes:
    mongodb_data:
