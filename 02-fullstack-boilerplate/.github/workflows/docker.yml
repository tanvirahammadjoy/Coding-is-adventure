# This workflow builds and pushes Docker images for the backend and frontend services
# .github/workflows/docker.yml

name: Docker Build & Push

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - 'frontend/**'
            - 'docker-compose.yml'
            - '.github/workflows/docker.yml'
    pull_request:
        branches:
            - main

env:
    REGISTRY: docker.io
    BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/fullstack-boilerplate-backend
    FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/fullstack-boilerplate-frontend

jobs:
    build-backend:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Extract version
              id: meta
              run: |
                  VERSION=$(git rev-parse --short HEAD)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

            - name: Build and push backend
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
                  tags: |
                      ${{ env.BACKEND_IMAGE }}:latest
                      ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.created=${{ steps.meta.outputs.timestamp }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    build-frontend:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Extract version
              id: meta
              run: |
                  VERSION=$(git rev-parse --short HEAD)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

            - name: Build and push frontend
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
                  tags: |
                      ${{ env.FRONTEND_IMAGE }}:latest
                      ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.created=${{ steps.meta.outputs.timestamp }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
